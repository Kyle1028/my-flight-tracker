<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航班搜尋</title>
    <!-- 引入 Google 字體與 Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <style>
        body {
            font-family: 'Roboto', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #202124;
            margin: 0;
            padding: 0;
        }

        /* 頂部導覽列裝飾 */
        .header {
            padding: 12px 24px;
            border-bottom: 1px solid #dadce0;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            color: #5f6368;
        }

        /* 搜尋區塊外框 */
        .hero-section {
            background-image: url('https://www.gstatic.com/travel-frontend/animation/hero/flights_nc_4.svg');
            background-position: center bottom;
            background-repeat: no-repeat;
            padding: 40px 20px 80px 20px;
        }

        .search-container {
            max-width: 1024px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
            padding: 16px 16px 40px 16px; /* 底部多留空間給懸浮按鈕 */
            position: relative;
        }

        /* 頂部選項 (視覺裝飾) */
        .search-options {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            color: #5f6368;
            font-size: 14px;
            font-weight: 500;
        }
        .search-options span {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        /* 輸入框排列 */
        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .input-group {
            display: flex;
            align-items: center;
            border: 1px solid #dadce0;
            border-radius: 4px;
            padding: 10px 14px;
            flex: 1;
            min-width: 200px;
            background: #fff;
            transition: border-color 0.2s;
        }

        .input-group:focus-within {
            border-color: #1a73e8;
            border-width: 2px;
            padding: 9px 13px; /* 抵銷邊框變粗 */
        }

        .input-group .material-symbols-outlined {
            color: #5f6368;
            margin-right: 12px;
            font-size: 20px;
        }

        .input-group input {
            border: none;
            outline: none;
            font-size: 16px;
            width: 100%;
            color: #3c4043;
            background: transparent;
        }

        /* 懸浮搜尋按鈕 */
        .search-btn {
            position: absolute;
            bottom: -24px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3);
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .search-btn:hover {
            background-color: #1b66c9;
            box-shadow: 0 2px 6px 0 rgba(60,64,67,0.3);
        }

        /* 搜尋結果區塊 */
        .results-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .result-card {
            display: none;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            transition: box-shadow 0.2s;
        }
        
        .result-card:hover {
            box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3);
        }

        .airline-info {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 16px;
            font-weight: 500;
        }

        .airline-info img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .price-info {
            text-align: right;
        }

        .price {
            font-size: 22px;
            color: #188038; /* Google Flights 常用的低價綠色 */
            font-weight: 500;
        }

        .loading-text {
            text-align: center;
            color: #5f6368;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="material-symbols-outlined">menu</span>
        <span>✈️ 航班搜尋</span>
    </div>

    <div class="hero-section">
        <div class="search-container">
            
            <div class="search-options">
                <span><span class="material-symbols-outlined">sync_alt</span>來回</span>
                <span><span class="material-symbols-outlined">person</span>1 位</span>
                <span>經濟艙</span>
            </div>

            <div class="input-row">
                <!-- 出發地 (純顯示，若要可更改需加上 JS 邏輯) -->
                <div class="input-group">
                    <span class="material-symbols-outlined">flight_takeoff</span>
                    <input type="text" value="台北 (TPE)" readonly>
                </div>
                
                <!-- 目的地 -->
                <div class="input-group">
                    <span class="material-symbols-outlined">flight_land</span>
                    <input type="text" value="福岡 (FUK)" readonly>
                </div>

                <!-- 去程日期 -->
                <div class="input-group">
                    <span class="material-symbols-outlined">calendar_today</span>
                    <input type="date" id="outbound" value="2026-01-13">
                </div>

                <!-- 回程日期 -->
                <div class="input-group">
                    <span class="material-symbols-outlined">calendar_today</span>
                    <input type="date" id="return" value="2026-01-19">
                </div>
            </div>

            <button class="search-btn" onclick="searchFlight()">
                <span class="material-symbols-outlined">search</span>
                搜尋
            </button>
        </div>
    </div>

    <div class="results-container">
        <div id="loading" class="loading-text">正在搜尋最佳航班組合...</div>
        
        <div id="resultCard" class="result-card" style="display: none;">
            <div class="airline-info">
                <span class="material-symbols-outlined" style="font-size: 32px; color: #1a73e8;">airlines</span>
                <span id="airline">航空公司名稱</span>
            </div>
            <div class="price-info">
                <div class="price" id="price">NT$ --</div>
                <div style="font-size: 12px; color: #5f6368; margin-top: 4px;">含稅與手續費</div>
            </div>
        </div>
    </div>

    <script>
        async function searchFlight() {
            const outbound = document.getElementById('outbound').value;
            const returnDate = document.getElementById('return').value;
            const resultCard = document.getElementById('resultCard');
            const loading = document.getElementById('loading');
            const priceEl = document.getElementById('price');
            const airlineEl = document.getElementById('airline');

            // 顯示載入狀態
            resultCard.style.display = 'none';
            loading.style.display = 'block';

            try {
                // 呼叫 Vercel 後端 API
                const response = await fetch(`/api/search?outbound=${outbound}&return_date=${returnDate}`);
                const data = await response.json();

                loading.style.display = 'none';

                if (data.price) {
                    priceEl.innerText = `NT$ ${data.price.toLocaleString()}`; // 加上千分位逗號
                    airlineEl.innerText = data.airline;
                    resultCard.style.display = 'flex';
                } else {
                    loading.style.display = 'block';
                    loading.innerText = '目前此日期查無合適航班。';
                }
            } catch (error) {
                loading.style.display = 'block';
                loading.innerText = '查詢失敗，請稍後再試。';
                console.error(error);
            }
        }
    </script>
</body>
</html>
