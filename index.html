<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航班搜尋</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #ffffff; color: #202124; margin: 0; padding: 0; }
        .header { padding: 12px 24px; border-bottom: 1px solid #dadce0; display: flex; align-items: center; gap: 12px; font-size: 22px; color: #5f6368; }
        .hero-section { background-image: url('https://www.gstatic.com/travel-frontend/animation/hero/flights_nc_4.svg'); background-position: center bottom; background-repeat: no-repeat; padding: 40px 20px 80px 20px; }
        .search-container { max-width: 1024px; margin: 0 auto; background: #fff; border-radius: 8px; box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15); padding: 16px 16px 40px 16px; position: relative; }
        
        .search-options { display: flex; gap: 12px; margin-bottom: 16px; color: #5f6368; font-size: 14px; font-weight: 500; }
        .search-options span { display: flex; align-items: center; gap: 4px; }
        
        /* 🔥 新增：讓上方選項在滑鼠移過去時有淺灰色背景，提示使用者可以點擊 */
        .search-options select { 
            border: none; 
            background-color: transparent; 
            font-size: 14px; 
            font-weight: 500; 
            color: #5f6368; 
            cursor: pointer; 
            outline: none; 
            font-family: inherit; 
            appearance: none; 
            padding: 6px 24px 6px 8px; 
            border-radius: 4px;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%235f6368' height='16' viewBox='0 0 24 24' width='16' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>"); 
            background-repeat: no-repeat; 
            background-position: right 4px center; 
            transition: background-color 0.2s, color 0.2s;
        }
        .search-options select:hover { 
            background-color: #f1f3f4; 
            color: #202124; 
        }

        .input-row { display: flex; flex-wrap: wrap; gap: 12px; }
        .input-group { display: flex; align-items: center; border: 1px solid #dadce0; border-radius: 4px; padding: 10px 14px; flex: 1; min-width: 200px; background: #fff; transition: border-color 0.2s; }
        .input-group:focus-within { border-color: #1a73e8; border-width: 2px; padding: 9px 13px; }
        .input-group .material-symbols-outlined { color: #5f6368; margin-right: 12px; font-size: 20px; }
        
        .input-group input, .input-group select { border: none; outline: none; font-size: 16px; width: 100%; color: #3c4043; background: transparent; font-family: inherit; cursor: pointer; }
        .input-group select { appearance: none; background: url("data:image/svg+xml;utf8,<svg fill='%235f6368' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>") no-repeat right; background-position-x: calc(100% - 4px); }

        .search-btn { position: absolute; bottom: -24px; left: 50%; transform: translateX(-50%); background-color: #1a73e8; color: white; border: none; border-radius: 24px; padding: 10px 24px; font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 8px; cursor: pointer; box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3); transition: 0.2s; }
        .search-btn:hover { background-color: #1b66c9; box-shadow: 0 2px 6px 0 rgba(60,64,67,0.3); }
        .results-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .result-card { display: none; border: 1px solid #dadce0; border-radius: 8px; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; margin-top: 20px; transition: 0.2s; }
        .result-card:hover { box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3); }
        .airline-info { display: flex; align-items: center; gap: 16px; font-size: 16px; font-weight: 500; }
        .price-info { text-align: right; }
        .price { font-size: 22px; color: #188038; font-weight: 500; }
        .loading-text { text-align: center; color: #5f6368; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <span class="material-symbols-outlined">menu</span>
        <span>✈️ 航班搜尋</span>
    </div>

    <div class="hero-section">
        <div class="search-container">
            
            <div class="search-options">
                <span>
                    <span class="material-symbols-outlined">sync_alt</span>
                    <select id="tripType" onchange="toggleReturnDate()">
                        <option value="1">來回</option>
                        <option value="2">單程</option>
                    </select>
                </span>
                <span>
                    <span class="material-symbols-outlined">person</span>
                    <select id="adults">
                        <option value="1">1 位</option>
                        <option value="2">2 位</option>
                        <option value="3">3 位</option>
                        <option value="4">4 位</option>
                    </select>
                </span>
                <span>
                    <select id="travelClass">
                        <option value="1">經濟艙</option>
                        <option value="2">豪華經濟艙</option>
                        <option value="3">商務艙</option>
                        <option value="4">頭等艙</option>
                    </select>
                </span>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <span class="material-symbols-outlined">flight_takeoff</span>
                    <select id="departure">
                        <option value="TPE" selected>台北 (TPE)</option>
                        <option value="TSA">台北松山 (TSA)</option>
                        <option value="KHH">高雄 (KHH)</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <span class="material-symbols-outlined">flight_land</span>
                    <select id="arrival">
                        <option value="FUK" selected>福岡 (FUK)</option>
                        <option value="NRT">東京成田 (NRT)</option>
                        <option value="HND">東京羽田 (HND)</option>
                        <option value="KIX">大阪關西 (KIX)</option>
                        <option value="OKA">沖繩 (OKA)</option>
                        <option value="CTS">札幌 (CTS)</option>
                    </select>
                </div>

                <div class="input-group">
                    <span class="material-symbols-outlined">calendar_today</span>
                    <input type="date" id="outbound" value="2026-01-13">
                </div>

                <div class="input-group" id="returnGroup">
                    <span class="material-symbols-outlined">calendar_today</span>
                    <input type="date" id="return" value="2026-01-19">
                </div>
            </div>

            <button class="search-btn" onclick="searchFlight()">
                <span class="material-symbols-outlined">search</span>
                搜尋
            </button>
        </div>
    </div>

    <div class="results-container">
        <div id="loading" class="loading-text">正在搜尋最佳航班組合...</div>
        <div id="resultCard" class="result-card">
            <div class="airline-info">
                <span class="material-symbols-outlined" style="font-size: 32px; color: #1a73e8;">airlines</span>
                <span id="airline">航空公司名稱</span>
            </div>
            <div class="price-info">
                <div class="price" id="price">NT$ --</div>
                <div style="font-size: 12px; color: #5f6368; margin-top: 4px;">含稅與手續費</div>
            </div>
        </div>
    </div>

    <script>
        function toggleReturnDate() {
            const tripType = document.getElementById('tripType').value;
            const returnGroup = document.getElementById('returnGroup');
            if (tripType === '2') {
                returnGroup.style.display = 'none';
            } else {
                returnGroup.style.display = 'flex';
            }
        }

        async function searchFlight() {
            const departure = document.getElementById('departure').value;
            const arrival = document.getElementById('arrival').value;
            const outbound = document.getElementById('outbound').value;
            const returnDate = document.getElementById('return').value;
            
            const tripType = document.getElementById('tripType').value;
            const adults = document.getElementById('adults').value;
            const travelClass = document.getElementById('travelClass').value;
            
            const resultCard = document.getElementById('resultCard');
            const loading = document.getElementById('loading');
            const priceEl = document.getElementById('price');
            const airlineEl = document.getElementById('airline');

            resultCard.style.display = 'none';
            loading.style.display = 'block';
            loading.innerText = '正在搜尋最佳航班組合...';

            try {
                let url = `/api/search?departure=${departure}&arrival=${arrival}&outbound=${outbound}&type=${tripType}&adults=${adults}&travel_class=${travelClass}`;
                
                if (tripType === '1') {
                    url += `&return_date=${returnDate}`;
                }

                const response = await fetch(url);
                const data = await response.json();

                loading.style.display = 'none';

                if (data.price) {
                    priceEl.innerText = `NT$ ${data.price.toLocaleString()}`;
                    airlineEl.innerText = data.airline;
                    resultCard.style.display = 'flex';
                } else {
                    loading.style.display = 'block';
                    loading.innerText = '目前此日期或航線查無合適航班。';
                }
            } catch (error) {
                loading.style.display = 'block';
                loading.innerText = '查詢失敗，請檢查網路狀態或稍後再試。';
                console.error(error);
            }
        }
    </script>
</body>
</html>
